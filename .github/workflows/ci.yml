# ============================================================
# Priya Global Platform — CI Pipeline
#
# Runs on every PR and push to main/staging.
# Stage 1: Lint + Security Scan
# Stage 2: Test
#
# No AWS credentials required.
# ============================================================

name: CI — Lint, Scan & Test

on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, staging, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Stage 1a: Python Lint ───
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint (all services)
        run: |
          ruff check services/ shared/ \
            --select E,F,W,I,N,UP,B,A,C4,SIM,TCH \
            --ignore E501 \
            --output-format github

      - name: Ruff format check
        run: ruff format --check services/ shared/

  # ─── Stage 1b: Python Security Scan ───
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit scan (all services)
        run: |
          bandit -r services/ shared/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            -x '**/test_*,**/*_test.py,**/tests/**' \
            || true

      - name: Bandit summary
        if: always()
        run: |
          bandit -r services/ shared/ \
            --severity-level high \
            --confidence-level high \
            -x '**/test_*,**/*_test.py,**/tests/**' \
            -f screen

      - name: Safety check (dependency vulnerabilities)
        run: |
          safety check -r requirements.txt \
            --output json \
            || echo "::warning::Safety found vulnerabilities — review above"

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ─── Stage 1c: Secret Detection ───
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified

  # ─── Stage 1d: Dockerfile Lint ───
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — Python Base
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.python-base
          failure-threshold: warning

      - name: Hadolint — Service
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.service
          failure-threshold: warning

      - name: Hadolint — Dashboard
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.dashboard
          failure-threshold: warning

  # ─── Stage 1e: Dashboard Lint ───
  dashboard-lint:
    name: Dashboard Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx next lint --max-warnings 0

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Stage 1f: Terraform Validate ───
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init (no backend)
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate

  # ─── Stage 2a: Python Tests ───
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [python-lint, python-security]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: priya_test
          POSTGRES_USER: priya
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U priya"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        service-group:
          - name: core
            services: "gateway auth tenant channel_router ai_engine tenant_config"
          - name: channels
            services: "whatsapp email voice social webchat sms telegram"
          - name: business
            services: "billing analytics marketing ecommerce notification plugins handoff leads"
          - name: advanced
            services: "conversation_intel appointments knowledge voice_ai video rcs workflows advanced_analytics ai_training marketplace"
          - name: ops
            services: "compliance health_monitor cdn_manager deployment"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests — ${{ matrix.service-group.name }}
        env:
          DATABASE_URL: postgresql+asyncpg://priya:test_password@localhost:5432/priya_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SENTRY_ENABLED: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          for svc in ${{ matrix.service-group.services }}; do
            echo "━━━ Testing: $svc ━━━"
            if [ -f "services/$svc/test_*.py" ] || [ -f "services/$svc/*_test.py" ] || [ -d "services/$svc/tests" ]; then
              pytest services/$svc/ \
                -v \
                --tb=short \
                --cov=services/$svc \
                --cov-report=xml:coverage-$svc.xml \
                --cov-report=term-missing \
                || echo "::warning::Tests failed for $svc"
            else
              echo "::notice::No tests found for $svc — skipping"
            fi
          done

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service-group.name }}
          path: coverage-*.xml
          retention-days: 14

  # ─── Stage 2b: Dashboard Tests ───
  dashboard-tests:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    needs: [dashboard-lint]
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ] || grep -q '"test"' package.json; then
            npm test -- --coverage --watchAll=false || echo "::warning::Dashboard tests failed"
          else
            echo "::notice::No test config found — skipping dashboard tests"
          fi

      - name: Build check
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ─── Stage 2c: Shared Module Tests ───
  shared-tests:
    name: Shared Module Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: priya_test
          POSTGRES_USER: priya
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U priya"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Test shared modules
        env:
          DATABASE_URL: postgresql+asyncpg://priya:test_password@localhost:5432/priya_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SENTRY_ENABLED: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d "tests/" ] || [ -d "shared/tests/" ]; then
            pytest tests/ shared/ \
              -v \
              --tb=short \
              --cov=shared \
              --cov-report=xml:coverage-shared.xml \
              --cov-report=term-missing \
              || echo "::warning::Shared module tests failed"
          else
            echo "::notice::No shared module tests found — skipping"
          fi

  # ─── Summary Gate ───
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    if: always()
    needs:
      - python-lint
      - python-security
      - secret-scan
      - dockerfile-lint
      - dashboard-lint
      - terraform-validate
      - python-tests
      - dashboard-tests
      - shared-tests
    steps:
      - name: Check results
        run: |
          echo "=== CI Pipeline Results ==="
          echo "Python Lint:        ${{ needs.python-lint.result }}"
          echo "Python Security:    ${{ needs.python-security.result }}"
          echo "Secret Scan:        ${{ needs.secret-scan.result }}"
          echo "Dockerfile Lint:    ${{ needs.dockerfile-lint.result }}"
          echo "Dashboard Lint:     ${{ needs.dashboard-lint.result }}"
          echo "Terraform Validate: ${{ needs.terraform-validate.result }}"
          echo "Python Tests:       ${{ needs.python-tests.result }}"
          echo "Dashboard Tests:    ${{ needs.dashboard-tests.result }}"
          echo "Shared Tests:       ${{ needs.shared-tests.result }}"

          # Fail if any critical job failed
          if [[ "${{ needs.python-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.python-security.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.python-tests.result }}" == "failure" ]]; then
            echo "::error::Critical CI checks failed"
            exit 1
          fi

          echo "✅ All critical CI checks passed"
