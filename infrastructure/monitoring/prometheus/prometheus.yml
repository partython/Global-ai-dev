# ============================================================
# Prometheus Configuration for Priya Global Platform
# ============================================================
# Scrapes metrics from:
# - All 41 Priya Global microservices (ports 9000-9043)
# - Node Exporter (host system metrics)
# - Redis Exporter (Redis cache metrics)
# - PostgreSQL Exporter (database metrics)
# - Prometheus self-monitoring

global:
  scrape_interval: 15s        # Default scrape interval
  evaluation_interval: 15s    # Evaluation interval for alerts/rules
  scrape_timeout: 10s         # Max time to wait for scrape response
  external_labels:
    monitor: 'priya-global'
    environment: 'production'
    cluster: 'primary'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      scheme: http
      timeout: 10s
      api_version: v1

# Load alert and recording rules
rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

scrape_configs:

  # ─── Core Platform Services (9000-9043) ───

  # Gateway Service (port 9000)
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:9000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Auth Service (port 9001)
  - job_name: 'auth'
    static_configs:
      - targets: ['auth:9001']
    metrics_path: '/metrics'
    scrape_interval: 15s

