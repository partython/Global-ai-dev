# ============================================================
# Grafana Dashboard Provisioning Configuration
# ============================================================
# Auto-loads dashboard JSON files from the dashboards directory

apiVersion: 1

providers:
  - name: 'Priya Global Dashboards'
    orgId: 1
    folder: 'Priya Global'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
