version: "3.9"

# Prometheus + Grafana Monitoring Stack for Priya Global
# Integrates with the main docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f infrastructure/monitoring/docker-compose.monitoring.yml up -d

networks:
  priya-net:
    external: true

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

services:
  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:latest
    container_name: priya-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    environment:
      TZ: UTC
    networks:
      - priya-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - node-exporter
      - redis-exporter
      - postgres-exporter

  # ─── AlertManager ───
  alertmanager:
    image: prom/alertmanager:latest
    container_name: priya-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      TZ: UTC
    networks:
      - priya-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:latest
    container_name: priya-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_RENDERING_SERVER_URL: http://grafana-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      TZ: UTC
    networks:
      - priya-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus

  # ─── Node Exporter (Host Metrics) ───
  node-exporter:
    image: prom/node-exporter:latest
    container_name: priya-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netdev.device-exclude=^(veth.*|br.*|docker.*)"
      - "--web.telemetry-path=/metrics"
    environment:
      TZ: UTC
    networks:
      - priya-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Exporter ───
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: priya-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: UTC
    command:
      - "-redis.addr=redis:6379"
      - "-web.telemetry-path=/metrics"
    networks:
      - priya-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL Exporter ───
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: priya-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://priya:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/priya_global?sslmode=require"
      PG_EXPORTER_EXCLUDE_DATABASES: "postgres,template0,template1"
      TZ: UTC
    networks:
      - priya-net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafana Renderer (for dashboard image rendering) ───
  grafana-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: priya-grafana-renderer
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ENABLE_METRICS: "true"
      TZ: UTC
    networks:
      - priya-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
