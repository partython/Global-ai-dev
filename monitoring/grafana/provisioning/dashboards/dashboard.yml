# ============================================================
# Grafana Dashboard Provisioning Configuration
#
# Auto-load dashboards from /var/lib/grafana/dashboards
# ============================================================

apiVersion: 1

providers:
  - name: "Priya Global Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
