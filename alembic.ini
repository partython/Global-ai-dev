# Alembic Configuration for Priya Global Platform
# Multi-tenant database migration management with Row Level Security

[alembic]
# Location of migration scripts
script_location = shared/migrations/alembic

# Template system for automatic generation
file_template = %%(rev)s_%%(slug)s

# System to use with 'python setup.py test' to test migrations
# echo off
# SECURITY: Connection URL should be set via DATABASE_URL environment variable
# Do NOT hardcode credentials in this file. Use:
#   export DATABASE_URL="postgresql://user:pass@host/dbname"
# Or set in .env file and load before running migrations
# sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
