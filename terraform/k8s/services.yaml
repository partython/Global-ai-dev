---
# Service definitions for Priya Global Platform
# Each service is exposed as ClusterIP internally
# External access is managed through AWS ALB Ingress

apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: priya-core
  labels:
    app: dashboard
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: dashboard
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
