---
# Network Policies for Priya Global Platform
# Implements zero-trust network security

apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: priya-core
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: priya-channels
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: priya-business
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: priya-advanced
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Gateway can accept external traffic and route internally
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: priya-core
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
---
# Allow metrics scraping from monitoring namespace
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: priya-core
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-monitoring
      ports:
        - protocol: TCP
          port: 9001
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: priya-channels
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-monitoring
      ports:
        - protocol: TCP
          port: 9001
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: priya-business
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-monitoring
      ports:
        - protocol: TCP
          port: 9001
---
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: priya-advanced
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-monitoring
      ports:
        - protocol: TCP
          port: 9001
---
# Core services can communicate with each other
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-core-communication
  namespace: priya-core
spec:
  podSelector:
    matchLabels:
      tier: core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-core
        - namespaceSelector:
            matchLabels:
              name: priya-channels
        - namespaceSelector:
            matchLabels:
              name: priya-business
        - namespaceSelector:
            matchLabels:
              name: priya-advanced
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
        - protocol: TCP
          port: 9002
        - protocol: TCP
          port: 9003
        - protocol: TCP
          port: 9004
        - protocol: TCP
          port: 9005
        - protocol: TCP
          port: 9006
        - protocol: TCP
          port: 9007
        - protocol: TCP
          port: 9008
        - protocol: TCP
          port: 9009
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow internal service communication
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
        - protocol: TCP
          port: 9002
        - protocol: TCP
          port: 9003
        - protocol: TCP
          port: 9004
        - protocol: TCP
          port: 9005
        - protocol: TCP
          port: 9006
        - protocol: TCP
          port: 9007
        - protocol: TCP
          port: 9008
        - protocol: TCP
          port: 9009
        - protocol: TCP
          port: 9010
        - protocol: TCP
          port: 9020
        - protocol: TCP
          port: 9030
    # Allow RDS access
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis access
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 6379
    # Allow Kafka access
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9094
---
# Channel services communication
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-channel-communication
  namespace: priya-channels
spec:
  podSelector:
    matchLabels:
      tier: channels
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-core
        - namespaceSelector:
            matchLabels:
              name: priya-channels
      ports:
        - protocol: TCP
          port: 9010
        - protocol: TCP
          port: 9011
        - protocol: TCP
          port: 9012
        - protocol: TCP
          port: 9013
        - protocol: TCP
          port: 9014
        - protocol: TCP
          port: 9015
        - protocol: TCP
          port: 9016
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Internal services
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
        - protocol: TCP
          port: 9002
        - protocol: TCP
          port: 9010
        - protocol: TCP
          port: 9020
    # RDS
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 6379
    # Kafka
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9094
    # External API calls (SMS, Email providers)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
          except:
            - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
---
