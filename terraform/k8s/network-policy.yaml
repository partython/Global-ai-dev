---
# ═══════════════════════════════════════════════════════════════════════════════
# Infrastructure Namespace (priya-infra) — Budget Redis + shared infra
# ═══════════════════════════════════════════════════════════════════════════════

# Default deny all ingress in priya-infra
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: priya-infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow Redis access ONLY from application namespaces on port 6379
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-app-namespaces
  namespace: priya-infra
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-core
        - namespaceSelector:
            matchLabels:
              name: priya-channels
        - namespaceSelector:
            matchLabels:
              name: priya-business
        - namespaceSelector:
            matchLabels:
              name: priya-advanced
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # DNS only — Redis should not make outbound connections
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow Prometheus to scrape priya-infra metrics
apiVersion: policy/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: priya-infra
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: priya-monitoring
      ports:
        - protocol: TCP
          port: 9001
