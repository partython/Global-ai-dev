# ============================================================
# Priya Global — External Secrets (AWS Secrets Manager)
#
# Requires: external-secrets-operator installed in cluster
# Install: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
# ============================================================

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: priya-core
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: priya-db-credentials
  namespace: priya-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: priya-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: priya-global/production/database
        property: url
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: priya-global/production/jwt
        property: secret_key
    - secretKey: SENTRY_DSN
      remoteRef:
        key: priya-global/production/sentry
        property: dsn
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef:
        key: priya-global/production/redis
        property: auth_token
---
# Repeat for each namespace
apiVersion: external-secrets.io/v1beta1
