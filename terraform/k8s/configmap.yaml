apiVersion: v1
kind: ConfigMap
metadata:
  name: priya-config
  namespace: priya-core
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  API_VERSION: "v1"
  API_GATEWAY_PORT: "8000"
  HEALTH_CHECK_INTERVAL: "30"
  GRACEFUL_SHUTDOWN_TIMEOUT: "30"
  # DATABASE_URL is injected from AWS Secrets Manager via external-secrets-operator
  DATABASE_POOL_SIZE: "10"
  DATABASE_POOL_TIMEOUT: "30"
  REDIS_URL: "redis://priya-global-production.xxxxx.ng.0001.aps1.cache.amazonaws.com:6379"
  REDIS_DB: "0"
  REDIS_CACHE_TTL: "3600"
  KAFKA_BOOTSTRAP_SERVERS: "b-1.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092,b-2.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092,b-3.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "AWS_MSK_IAM"
  KAFKA_CONSUMER_GROUP: "priya-global-consumers"
  KAFKA_PRODUCER_ACKS: "all"
  KAFKA_COMPRESSION_TYPE: "snappy"
  KAFKA_BATCH_SIZE: "16384"
  SENTRY_ENVIRONMENT: "production"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  CORS_ALLOWED_ORIGINS: "https://dashboard.priya-global.com,https://api.priya-global.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CORS_MAX_AGE: "3600"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "1000"
  METRICS_ENABLED: "true"
  METRICS_NAMESPACE: "priya_global"
  OPENTELEMETRY_ENABLED: "true"
  OPENTELEMETRY_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.priya-monitoring:4317"
  FEATURE_FLAGS_ENABLED: "true"
  FEATURE_FLAGS_SERVICE_URL: "http://feature-flags-service:9000"
  AUDIT_LOG_ENABLED: "true"
  AUDIT_LOG_RETENTION_DAYS: "365"
  FILE_STORAGE_TYPE: "s3"
  FILE_STORAGE_BUCKET: "priya-global-files"
  FILE_STORAGE_REGION: "ap-south-1"
  FILE_UPLOAD_MAX_SIZE: "104857600"
  EMAIL_SERVICE_ENABLED: "true"
  EMAIL_SERVICE_HOST: "email-service"
  EMAIL_SERVICE_PORT: "9000"
  SMS_SERVICE_ENABLED: "true"
  SMS_SERVICE_HOST: "sms-service"
  SMS_SERVICE_PORT: "9000"
  NOTIFICATION_QUEUE: "priya-notifications"
  NOTIFICATION_DEAD_LETTER_QUEUE: "priya-notifications-dlq"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: priya-config
  namespace: priya-channels
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  # DATABASE_URL is injected from AWS Secrets Manager via external-secrets-operator
  REDIS_URL: "redis://priya-global-production.xxxxx.ng.0001.aps1.cache.amazonaws.com:6379"
  KAFKA_BOOTSTRAP_SERVERS: "b-1.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092,b-2.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092,b-3.priya-global-production.xxxxx.kafka.aps1.amazonaws.com:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "AWS_MSK_IAM"
  SENTRY_ENVIRONMENT: "production"
---
