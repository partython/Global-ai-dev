      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: migration
    restart: "no"
    working_dir: /app
    command: ["python", "-m", "alembic", "-c", "shared/migrations/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Dashboard ───

  dashboard:
    build:
