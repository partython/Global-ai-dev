# ============================================================
# Priya Global Platform — Docker Compose
#
# Local development & testing stack.
# Includes all 36 microservices + dashboard + infrastructure.
#
# Quick start:
#   docker compose up -d postgres redis kafka
#   docker compose up -d gateway auth tenant
#   docker compose up -d dashboard
#
# Full platform:
#   docker compose up -d
#
# Profiles:
#   core     — gateway, auth, tenant, channel-router, ai-engine
#   channels — whatsapp, email, voice, social, webchat, sms, telegram
#   business — billing, analytics, marketing, ecommerce, notification
#   advanced — conversation-intel, leads, knowledge, voice-ai, video, rcs, workflows
#   ops      — health-monitor, cdn-manager, deployment, compliance
#   infra    — postgres, redis, kafka, zookeeper
# ============================================================

x-python-service: &python-service
  build:
    context: .
    dockerfile: Dockerfile.service
  restart: unless-stopped
  networks:
    - priya-net
  volumes:
    - ./config:/app/config:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  env_file:
    - .env
  environment: &common-env
    ENVIRONMENT: development
    DATABASE_URL: postgresql+asyncpg://priya:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/priya_global
    REDIS_URL: redis://redis:6379/0
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_SECURITY_PROTOCOL: PLAINTEXT
    SENTRY_DSN: ${SENTRY_DSN:-}
    SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
    LOG_LEVEL: INFO
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ─── Infrastructure ───

  postgres:
    image: postgres:16-alpine
    container_name: priya-postgres
    profiles: ["infra", "core"]
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: priya_global
      POSTGRES_USER: priya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set - see .env.example}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priya -d priya_global"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - priya-net

  redis:
    image: redis:7-alpine
    container_name: priya-redis
    profiles: ["infra", "core"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - priya-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: priya-kafka
    profiles: ["infra", "core"]
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "priya-local-dev-kafka-001"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - priya-net

  # ─── Layer 0: API Gateway ───

  gateway:
    <<: *python-service
    container_name: priya-gateway
    profiles: ["core"]
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "9000"
        WORKERS: "2"
    ports:
      - "9000:9000"
    environment:
      <<: *common-env
      SERVICE_NAME: gateway
      SERVICE_PORT: "9000"

