      args:
        NEXT_PUBLIC_API_URL: http://localhost:9000
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
        NEXT_PUBLIC_ENVIRONMENT: development
        NODE_ENV_OVERRIDE: development
    container_name: priya-dashboard
    profiles: ["core"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:9000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GATEWAY_INTERNAL_URL: http://gateway:9000
      DATABASE_URL: postgres://priya:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/priya_global
      JWT_SECRET: ${CREDENTIALS_ENCRYPTION_KEY:-fallback-dev-secret}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID:-}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET:-}
    depends_on:
      gateway:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - priya-net

  # ─── Monitoring Stack ───

  prometheus:
